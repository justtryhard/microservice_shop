<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SFMShop - Admin panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        form {
            background-color: #f5f5f5;
            padding: 20px;
            width: 300px;
            border-radius: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
        }

        button {
            color: #42aaff;
            padding: 10px
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 3px;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Admin panel SFMShop</h1>

    <form id="productForm">
        <label for="name">Product name:</label>
        <input type="text" id="name" placeholder="name" required/>
        <label for="price">Product price:</label>
        <input type="number" id="price" placeholder="price" step="0.01" required/>
        <label for="quantity">Product quantity:</label>
        <input type="number" id="quantity" placeholder="quantity" required/>
        <button type="submit">Add product</button>
    </form>

    <div id="message"></div>
    <hr>
    <button id="getProductsBtn">Get products list</button>
    <div id="productsList"></div>
    <script>
        const ACCESS_TOKEN = "secret"
        const message = document.getElementById("message")
        const productsList = document.getElementById("productsList")

    // отправка формы

    document.getElementById("productForm").addEventListener("submit", async function(event) {
        event.preventDefault();

        // Получение данных из формы
        const formData = {
            name: document.getElementById("name").value,
            price: parseFloat(document.getElementById("price").value),
            quantity: parseInt(document.getElementById("quantity").value)
        };

         // Отправка данных на сервер
        try {
            const response = await fetch("/api/v1/products", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + ACCESS_TOKEN
                },
                body: JSON.stringify(formData)
            });

            const messageDiv = document.getElementById('message');
            if (response.ok) {
                  const result = await response.json();
                  messageDiv.textContent = `Product successfully created! ID: ${result.id}`;
                  messageDiv.className = 'success';

                   // Очистка формы
                   document.getElementById('productForm').reset();
            } else {
                const error = await response.json();
                messageDiv.textContent = `Error: ${error.detail || 'Unknown error'}`;
                messageDiv.className = 'error';
            }

            } catch (error) {
                 const messageDiv = document.getElementById('message');
                 messageDiv.textContent = `Connection error: ${error.message}`;
                 messageDiv.className = 'error';
        }
    });


    // получение товаров

    document.getElementById("getProductsBtn").addEventListener("click", async function(){

        const productsList = document.getElementById("productsList")

        try {
            const response = await fetch("/api/v1/products", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + ACCESS_TOKEN
                }
            })

            if (response.ok) {
                const products = await response.json()
                productsList.innerHTML = ""
                const ul = document.createElement("ul")
                for (const id in products) {
                    const product = products[id]
                    const li = document.createElement("li")
                    li.textContent =
                        `id: ${id} | Name: ${product.name} | Price: ${product.price} | Quantity: ${product.quantity}`
                    ul.appendChild(li)
                }
                productsList.appendChild(ul)

            } else {
                const error = await response.json()
                productsList.textContent = "Error: " + error.detail
            }

        } catch (error) {
        productsList.textContent = "Connection error: " + error.message
    }
})
    </script>

    </body>
    </html>
