version: '3.8'

services:
  app:
      build:
        context: ..
        dockerfile: docker/Dockerfile
      ports:
        - "8000:8000"
      environment:
        - REDIS_URL=redis://redis:6379
      depends_on:
        - redis
      volumes:
        - ../src:/app/src
  redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        volumes:
          - redis_data:/data
volumes:
  redis_data: